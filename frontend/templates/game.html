<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Orion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/game.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/description.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/inventory.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/response.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/terminal.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/datapad.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/events.css') }}">
</head>
<body>

    <div id="game-screen">

        <!-- ── Main area (image + right panel) ─────────────── -->
        <div id="main-area">

           <!-- Left: Room image + tab strip + slide-out panels -->
            <div id="room-image-panel">
                <!-- Tab strip — horizontal tabs along top edge -->
                <div id="tab-strip">
                    <div class="tab" id="tab-inv" data-panel="panel-inventory" title="Inventory">
                        <span class="tab-label">INV</span>
                    </div>
                    <div class="tab hidden" id="tab-term" data-panel="panel-terminal" title="Terminal">
                        <span class="tab-label">TERM</span>
                    </div>
                    <div class="tab hidden" id="tab-pad" data-panel="panel-datapad" title="Datapad">
                        <span class="tab-label">PAD</span>
                    </div>
                </div>

                <div id="room-image-area">
                    <img id="room-image" src="" alt="" />
                    <div id="room-image-placeholder">[ NO SIGNAL ]</div>

                    <!-- Slide-out panels — cover the room image -->
                    <div class="slide-panel" id="panel-inventory">
                        <div class="slide-panel-inner">
                            <div class="slide-panel-placeholder">INVENTORY</div>
                        </div>
                    </div>
                    <!-- Terminal slide-out panel -->
                    <div class="slide-panel" id="panel-terminal">
                        <div class="term-scanlines"></div>
                        <div class="slide-panel-inner" id="terminal-panel-inner">
                        </div>
                    </div>
                    <!-- Datapad slide-out panel -->
                    <div class="slide-panel" id="panel-datapad">
                        <div class="slide-panel-inner" id="datapad-panel-inner">
                        </div>
                    </div>
                </div>

            </div>

            <!-- Right: Three stacked panels -->
            <div id="right-panel">

                <!-- Description -->
                <div id="description-panel" class="text-panel">
                    <div id="description-content">
                        <!-- Room name, objects, exits populated by JS -->
                    </div>
                </div>

                <!-- Divider -->
                <div class="panel-divider"></div>

                <!-- Response -->
                <div id="response-panel" class="text-panel">
                    <div id="response-content">
                        <!-- Command responses populated by JS -->
                    </div>
                </div>

                <!-- Divider -->
                <div class="panel-divider"></div>

                <!-- Command input -->
                <div id="input-panel">
                    <span id="input-prompt">&gt;</span>
                    <input
                        type="text"
                        id="command-input"
                        autocomplete="off"
                        spellcheck="false"
                        placeholder="enter command..."
                        disabled
                    />
                </div>

            </div>

        </div>

        <!-- ── Event strip (full width, fixed bottom) ───────── -->
        <div id="event-strip">
            <div id="event-left">
                <!-- Events and alerts appear here -->
            </div>
            <div id="event-right">
                <span id="ship-name-display"></span>
                <span id="ship-time-display">--  --:--</span>
            </div>
        </div>

        <!-- ── Debug console (Ctrl+D to toggle) ─────────── -->
        <div id="debug-panel" class="hidden">
            <div id="debug-output"></div>
            <div id="debug-input-row">
                <span id="debug-prompt">DBG&gt;</span>
                <input type="text" id="debug-input" autocomplete="off"
                       spellcheck="false" placeholder="break <id> | fix <id>"/>
            </div>
        </div>

    </div>

    <!-- Exit door state tooltip — body level so never clipped -->
    <div id="exit-tooltip" class="exit-tooltip hidden"></div>

    <!-- Map hover tooltip — body level so never clipped -->
    <div id="map-tooltip" class="map-tooltip hidden"></div>

    <!-- JS modules — order matters -->
    <script src="{{ url_for('static', filename='js/core/constants.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/loop.js') }}"></script>
    <script src="{{ url_for('static', filename='js/screens/ui.js') }}"></script>
    <script src="{{ url_for('static', filename='js/screens/commands.js') }}"></script>
    <script src="{{ url_for('static', filename='js/screens/description.js') }}"></script>
    <script src="{{ url_for('static', filename='js/screens/inventory.js') }}"></script>
    <script src="{{ url_for('static', filename='js/screens/map.js') }}"></script>
    <script src="/static/js/screens/terminal_core.js"></script>
    <script src="/static/js/screens/terminal_engineering.js"></script>
    <script src="/static/js/screens/terminal_manifest.js"></script>
    <script src="{{ url_for('static', filename='js/screens/datapad.js') }}"></script>
    <script src="{{ url_for('static', filename='js/screens/game.js') }}"></script>
</body>
</html>
