  <!-- ═══════════════════════════════════════════════════ -->
  <!-- POWER SOURCE ICONS — driven by game.js             -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- REACTOR: reactor_core  (Engineering) -->
