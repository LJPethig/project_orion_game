    <line x1="-7" y1="5"  x2="-13" y2="9"  stroke="#00ff44" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0"  y1="-22" x2="0"  y2="-26" stroke="#00ff44" stroke-width="1" stroke-linecap="round"/>
    <line x1="0"  y1="22"  x2="0"  y2="26"  stroke="#00ff44" stroke-width="1" stroke-linecap="round"/>
    <line x1="22" y1="0"   x2="26" y2="0"   stroke="#00ff44" stroke-width="1" stroke-linecap="round"/>
