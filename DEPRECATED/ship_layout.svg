<svg width="1100" height="1480" viewBox="0 0 1100 1480"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Scale = 40 units per meter -->

  <defs>
    <style>
      .wall       { stroke: #444; stroke-width: 6; fill: none; stroke-linecap: square; }
      .room-fill  { fill-opacity: 0.22; stroke: none; }
      text        { fill: #ccc; font-family: Arial, sans-serif; pointer-events: none; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a0e1a"/>

  <!-- All x-coordinates +40 compared to previous version -->

  <!-- Recreation Room walls -->
  <g class="wall">
    <line x1="740" y1="205" x2="800" y2="205"/>
    <line x1="840" y1="205" x2="900" y2="205"/>
    <line x1="740" y1="425" x2="760" y2="425"/>
    <line x1="800" y1="425" x2="900" y2="425"/>
    <line x1="740" y1="205" x2="740" y2="235"/>
    <line x1="740" y1="275" x2="740" y2="345"/>
    <line x1="740" y1="345" x2="740" y2="365"/>
    <line x1="740" y1="425" x2="740" y2="405"/>
    <line x1="900" y1="205" x2="900" y2="295"/>
    <line x1="900" y1="335" x2="900" y2="425"/>
  </g>

  <rect id="rec-room-fill" class="room-fill"
        x="746" y="211" width="148" height="208"
        fill="#4a6fa5"/>

  <text x="750" y="345" font-size="18">Recreation Room</text>
  <text x="820" y="360" font-size="13" fill="#aaa">5.5 × 4 m</text>

  <!-- Cockpit walls -->
  <g class="wall">
    <line x1="770" y1="85"  x2="870" y2="85"/>
    <line x1="770" y1="205" x2="800" y2="205"/>
    <line x1="840" y1="205" x2="870" y2="205"/>
    <line x1="770" y1="85"  x2="770" y2="205"/>
    <line x1="870" y1="85"  x2="870" y2="205"/>
  </g>

  <rect id="cockpit-fill" class="room-fill"
